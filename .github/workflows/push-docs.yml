name: Synchronize Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout components-systems
        uses: actions/checkout@v6
        with:
          path: components-systems

      - name: Checkout docs
        uses: actions/checkout@v6
        with:
          path: docs
          repository: nanoforge-dev/docs
          token: ${{ secrets.ACTIONS_KEY }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/

      - uses: pnpm/action-setup@v6.0.3
        name: Install pnpm
        with:
          run_install: false

      - name: setup git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "username@users.noreply.github.com"

      - name: install doxygen
        uses: ssciwr/doxygen-install@v2

      - name: install deps
        run: cd components-systems && pnpm i

      - name: synchronize docs
        run: |
          cd components-systems
          ./scripts/build_docs.sh
          cd ..
          rm docs/components-systems -rf
          mkdir -p docs/components-systems
          cp -r components-systems/docs/* docs/components-systems
          cd docs
          git add . || echo "No changes to add"
          git commit -m "chore(components-systems): updating docs" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
