name: "Label sync"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
jobs:
  label-sync:
    name: Label sync
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    if: github.repository_owner == 'NanoForge-dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Label sync
        uses: crazy-max/ghaction-github-labeler@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
